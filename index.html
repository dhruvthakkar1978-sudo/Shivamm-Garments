<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivamm Garments - Premium Women's Clothing in Surat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7c3aed;
            --primary-dark: #6d28d9;
            --primary-light: #a78bfa;
            --secondary: #ec4899;
            --bg: #faf5ff;
            --text: #1f2937;
            --text-light: #6b7280;
            --white: #ffffff;
            --border: #e5e7eb;
            --success: #10b981;
            --danger: #ef4444;
            --shadow: rgba(124, 58, 237, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
            padding: 1.5rem 1rem;
            text-align: center;
            box-shadow: 0 4px 20px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .tagline {
            font-size: 0.9rem;
            opacity: 0.95;
            font-weight: 300;
        }

        .contact-info {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .contact-info span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* Category Filter */
        .category-filter {
            background: var(--white);
            padding: 1rem;
            box-shadow: 0 2px 10px var(--shadow);
            position: sticky;
            top: 110px;
            z-index: 90;
        }

        .filter-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .filter-btn {
            padding: 0.5rem 1.25rem;
            border: 2px solid var(--primary);
            background: var(--white);
            color: var(--primary);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .filter-btn.active {
            background: var(--primary);
            color: var(--white);
        }

        /* Products Grid */
        .products-section {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px var(--shadow);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px var(--shadow);
        }

        .product-image {
            width: 100%;
            height: 350px;
            object-fit: cover;
            background: linear-gradient(45deg, #f3f4f6, #e5e7eb);
        }

        .product-info {
            padding: 1.25rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .product-category {
            display: inline-block;
            background: var(--bg);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .product-description {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .add-to-cart {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .add-to-cart:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px var(--shadow);
        }

        .add-to-cart:active {
            transform: scale(0.95);
        }

        /* Cart Icon */
        .cart-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--shadow);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .cart-icon:hover {
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: var(--white);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* WhatsApp Button */
        .whatsapp-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #25d366;
            color: var(--white);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .whatsapp-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(37, 211, 102, 0.4);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--white);
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
            padding: 1.5rem;
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-modal {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: var(--white);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .modal-body {
            padding: 1.5rem;
        }

        /* Cart Items */
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg);
            border-radius: 8px;
            align-items: center;
        }

        .cart-item-info {
            flex-grow: 1;
        }

        .cart-item-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 500;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quantity-btn {
            width: 28px;
            height: 28px;
            border: 2px solid var(--primary);
            background: var(--white);
            color: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .quantity-btn:hover {
            background: var(--primary);
            color: var(--white);
        }

        .quantity {
            width: 40px;
            text-align: center;
            font-weight: 600;
        }

        .remove-item {
            background: var(--danger);
            color: var(--white);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .remove-item:hover {
            background: #dc2626;
        }

        .cart-total {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--border);
            text-align: right;
        }

        .total-label {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text);
        }

        .total-amount {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* Checkout Form */
        .checkout-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-weight: 500;
            color: var(--text);
        }

        .form-input {
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--shadow);
        }

        textarea.form-input {
            resize: vertical;
            min-height: 100px;
        }

        .checkout-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow);
        }

        .checkout-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Empty Cart */
        .empty-cart {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .empty-cart-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Success Message */
        .success-message {
            display: none;
            background: var(--success);
            color: var(--white);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 1rem;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .category-filter {
                top: 95px;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }

            .product-image {
                height: 200px;
            }

            .product-info {
                padding: 1rem;
            }

            .product-name {
                font-size: 0.95rem;
            }

            .product-price {
                font-size: 1.25rem;
            }

            .add-to-cart {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }

            .cart-icon,
            .whatsapp-btn {
                width: 50px;
                height: 50px;
            }

            .modal-content {
                width: 95%;
                border-radius: 16px 16px 0 0;
                max-height: 100vh;
            }
        }

        /* Loading Spinner */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--white);
            animation: spin 0.8s ease infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: var(--white);
            padding: 1rem 2rem;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <h1>✨ Shivamm Garments ✨</h1>
            <p class="tagline">Premium Women's Clothing Collection</p>
            <div class="contact-info">
                <span>📍 Surat, Gujarat</span>
                <span>📞 7383370059</span>
            </div>
        </div>
    </header>

    <!-- Category Filter -->
    <div class="category-filter">
        <div class="filter-container">
            <button class="filter-btn active" data-category="all">All Products</button>
            <button class="filter-btn" data-category="kurti">Kurti</button>
            <button class="filter-btn" data-category="3piece">3 Piece Suit</button>
            <button class="filter-btn" data-category="lehnga">Lehnga Choli</button>
        </div>
    </div>

    <!-- Products Section -->
    <section class="products-section">
        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>
    </section>

    <!-- Cart Icon -->
    <div class="cart-icon" onclick="openCart()">
        🛒
        <span class="cart-count" id="cartCount">0</span>
    </div>

    <!-- WhatsApp Button -->
    <a href="https://wa.me/917383370059" target="_blank" class="whatsapp-btn">
        💬
    </a>

    <!-- Cart Modal -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Your Shopping Cart</h2>
                <button class="close-modal" onclick="closeCart()">×</button>
            </div>
            <div class="modal-body">
                <div id="cartContent"></div>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal" id="checkoutModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Complete Your Order</h2>
                <button class="close-modal" onclick="closeCheckout()">×</button>
            </div>
            <div class="modal-body">
                <div class="success-message" id="successMessage">
                    Order placed successfully! We'll contact you soon on WhatsApp.
                </div>
                <form id="checkoutForm" class="checkout-form" action="https://formspree.io/f/mzdawqza" method="POST">
                    <div class="form-group">
                        <label class="form-label">Name *</label>
                        <input type="text" name="name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number *</label>
                        <input type="tel" name="phone" class="form-input" pattern="[0-9]{10}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Delivery Address *</label>
                        <textarea name="address" class="form-input" required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Special Instructions (Optional)</label>
                        <textarea name="instructions" class="form-input"></textarea>
                    </div>
                    <input type="hidden" name="orderDetails" id="orderDetails">
                    <input type="hidden" name="_subject" value="New Order from Shivamm Garments Website">
                    <button type="submit" class="checkout-btn" id="submitBtn">
                        Place Order
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // Products Data
        const products = [
            {
                id: 1,
                name: "Roman Silk Plazo Pair",
                price: 2000,
                category: "3piece",
                image: "https://i.ibb.co/23jnCMd9/Whats-App-Image-2026-02-26-at-10-42-02-AM.jpg",
                description: "Best Design - Elegant Roman silk plazo pair"
            },
            {
                id: 2,
                name: "Mul Chanderi Suit",
                price: 1799,
                category: "3piece",
                image: "https://i.ibb.co/SXWW9cQM/Whats-App-Image-2026-02-25-at-6-50-08-PM.jpg",
                description: "Beautiful design in premium Mul chanderi fabric"
            },
            {
                id: 3,
                name: "Short Flare Plazo With Dupatta",
                price: 1800,
                category: "3piece",
                image: https://i.ibb.co/3LBQj7L/Whats-App-Image-2026-02-24-at-4-56-32-PM.jpg",
                description: "Beautiful work - Stylish short flare plazo set"
            },


            {
                id: 4,
                name: "Dhaboo cotton3 pc pant pair",
                price:900,
                category: "3piece",
                image: "https://i.ibb.co/93dz9Nwc/Whats-App-Image-2026-03-02-at-11-37-30-AM.jpg",
                description: "Elegant palazzo suit with heavy embroidery"
            },
            {
                id: 5,
                name: "Lehnga choli",
                price:2200,
                category: "Lehnga cholie",
                image: "https://i.ibb.co/rKQFHQwD/Whats-App-Image-2026-03-02-at-7-39-27-PM.jpg",
                description: "Beautiful Lehnga Choli"
            },

        ];

        // Cart Management
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let currentFilter = 'all';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCartCount();
            setupEventListeners();
        });

        // Setup Event Listeners
        function setupEventListeners() {
            // Category filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.category;
                    renderProducts();
                });
            });

            // Checkout form
            document.getElementById('checkoutForm').addEventListener('submit', handleCheckout);
        }

        // Render Products
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filteredProducts = currentFilter === 'all' 
                ? products 
                : products.filter(p => p.category === currentFilter);

            grid.innerHTML = filteredProducts.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy" 
                         onerror="this.src='https://via.placeholder.com/300x350/f3f4f6/9ca3af?text=Image+Not+Available'">
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <span class="product-category">${getCategoryLabel(product.category)}</span>
                        <p class="product-description">${product.description}</p>
                        <div class="product-footer">
                            <span class="product-price">₹${product.price.toLocaleString()}</span>
                            <button class="add-to-cart" onclick="addToCart(${product.id})">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Get Category Label
        function getCategoryLabel(category) {
            const labels = {
                'kurti': 'Kurti',
                '3piece': '3 Piece Suit',
                'lehnga': 'Lehnga Choli'
            };
            return labels[category] || category;
        }

        // Add to Cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({
                    ...product,
                    quantity: 1
                });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showToast(`${product.name} added to cart!`);
        }

        // Update Cart Count
        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        // Open Cart
        function openCart() {
            renderCart();
            document.getElementById('cartModal').classList.add('active');
        }

        // Close Cart
        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }

        // Render Cart
        function renderCart() {
            const cartContent = document.getElementById('cartContent');
            
            if (cart.length === 0) {
                cartContent.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <h3>Your cart is empty</h3>
                        <p>Start shopping to add items to your cart!</p>
                    </div>
                `;
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            cartContent.innerHTML = `
                <div class="cart-items">
                    ${cart.map(item => `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <div class="cart-item-name">${item.name}</div>
                                <div class="cart-item-price">₹${item.price.toLocaleString()} × ${item.quantity} = ₹${(item.price * item.quantity).toLocaleString()}</div>
                            </div>
                            <div class="quantity-controls">
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                                <span class="quantity">${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            </div>
                            <button class="remove-item" onclick="removeFromCart(${item.id})">Remove</button>
                        </div>
                    `).join('')}
                </div>
                <div class="cart-total">
                    <div class="total-label">Total Amount:</div>
                    <div class="total-amount">₹${total.toLocaleString()}</div>
                </div>
                <button class="checkout-btn" onclick="openCheckout()">
                    Proceed to Checkout
                </button>
            `;
        }

        // Update Quantity
        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    localStorage.setItem('cart', JSON.stringify(cart));
                    updateCartCount();
                    renderCart();
                }
            }
        }

        // Remove from Cart
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            renderCart();
            showToast('Item removed from cart');
        }

        // Open Checkout
        function openCheckout() {
            if (cart.length === 0) {
                showToast('Your cart is empty!');
                return;
            }
            closeCart();
            document.getElementById('checkoutModal').classList.add('active');
            prepareOrderDetails();
        }

        // Close Checkout
        function closeCheckout() {
            document.getElementById('checkoutModal').classList.remove('active');
        }

        // Prepare Order Details
        function prepareOrderDetails() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            let orderSummary = "ORDER DETAILS:\n";
            orderSummary += "================\n\n";
            
            cart.forEach(item => {
                orderSummary += `${item.name}\n`;
                orderSummary += `Price: ₹${item.price} × Quantity: ${item.quantity} = ₹${item.price * item.quantity}\n\n`;
            });
            
            orderSummary += "----------------\n";
            orderSummary += `TOTAL AMOUNT: ₹${total}\n`;
            orderSummary += "================\n\n";
            orderSummary += "Shop: Shivamm Garments\n";
            orderSummary += "Contact: 7383370059\n";
            orderSummary += "Location: Surat, Gujarat";

            document.getElementById('orderDetails').value = orderSummary;
        }

        // Handle Checkout
        async function handleCheckout(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Placing Order...';

            try {
                const formData = new FormData(e.target);
                const response = await fetch(e.target.action, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // Clear cart
                    cart = [];
                    localStorage.removeItem('cart');
                    updateCartCount();

                    // Show success message
                    document.getElementById('successMessage').classList.add('show');
                    e.target.reset();
                    
                    setTimeout(() => {
                        closeCheckout();
                        showToast('Order placed successfully! We will contact you soon.');
                        document.getElementById('successMessage').classList.remove('show');
                    }, 3000);
                } else {
                    throw new Error('Order submission failed');
                }
            } catch (error) {
                showToast('Error placing order. Please try again or contact us directly.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Place Order';
            }
        }

        // Show Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
